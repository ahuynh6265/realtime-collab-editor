<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Collab Editor</title>
  <script src = "https://cdn.tailwindcss.com"></script>
  
</head>


<body class = "bg-neutral-800 min-h-screen flex items-center justify-center">
  <div class = "bg-neutral-900 p-8 rounded-lg w-full max-w-sm flex flex-col gap-4">
    <h1 class = "text-white text-2xl font-semibold text-center">Realtime Collab Editor</h1>
    <p class = "text-neutral-400 text-sm text-center">A real-time collaborative document editor</p>

    <div class = "flex justify-center gap-4">
      <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" onclick = "window.location.href = '/auth/login'">Sign In</button>

      <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" onclick = "window.location.href = '/auth/register'">Sign Up</button>
    </div>

  </div>
</body>
