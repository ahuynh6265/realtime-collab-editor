<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collab Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src = "https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-in-left {
      0% {visibility: visible; transform: translate3d(-100%, 0, 0);}
      100% {transform: translate3d(0, 0, 0);}
    }
    @keyframes slide-out-left {
      0% {transform: translate3d(0, 0, 0);}
      100% {visibility: hidden; transform: translate3d(-100%, 0, 0);}
    }
    .slide-in {
      animation: slide-in-left 0.3s ease forwards;
    }
    .slide-out {
      animation: slide-out-left 0.3s ease forwards;
    }
    #edit {
      min-height: 1056px;
      background-image: repeating-linear-gradient(
        to bottom, 
        transparent 0px, 
        transparent 1054px, 
        #5a5a5a 1054px, 
        #5a5a5a 1056px 
      );
    }

    @keyframes blink {
      0%, 100% {opacity: 0;}
      50% {opacity: 1;}
    }
    .dot {
      animation: blink 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) {
      animation-delay: 0s;
    }
    .dot:nth-child(3) {
      animation-delay: 0.2s;
    }
    .dot:nth-child(4) {
      animation-delay: 0.4s;
    }
  </style>
</head>

<body class = "bg-neutral-800 min-h-screen p-8">
  <div class = "bg-neutral-900 p-4 rounded-lg mb-4 flex flex-col ">
    <div class = "flex items-center overflow-x-auto gap-4">
      <div class = "flex items-center gap-2 whitespace-nowrap min-w-fit">
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" onclick = "window.location.href = '/home'">Home</button><span id = "room-indicator" class = "text-white text-sm"></span>
      </div>   

      <div class = "flex items-center gap-2 whitespace-nowrap min-w-fit">
        <label class = "text-white" for ="title">Title: </label>
        <input class = "bg-neutral-700 text-white rounded px-3 py-1 outline-none w-48" type ="text" id ="title" placeholder= "Title here"/> 
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "save">Save Title Name</button>
      </div> 
      
      <div class = "rounded-full w-8 h-8 bg-gradient-to-b from-orange-400 to-orange-800 flex items-center justify-center text-white text-sm font-bold ml-auto" id = "user-icon"></div>
      
    </div>

    <div class = "flex items-center overflow-x-auto gap-4">
      <div class = "flex items-center gap-2 whitespace-nowrap min-w-fit">
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "brainstorm">Brainstorm</button>
      </div> 

      <div class = "flex items-center gap-2 whitespace-nowrap min-w-fit">
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "history">History</button>
      </div>

      <div class = "flex items-center gap-2 whitespace-nowrap min-w-fit ">
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "logout">Logout</button>
      </div>    

      <div class = "flex items-center gap-2 whitespace-nowrap min-w-fit ml-auto">
        <button class = "hidden cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "share">Share</button>
      </div>  
    </div>
  </div>

  <div class = "hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" id = "share-doc">
    <div class = "bg-neutral-900 rounded-lg p-6 flex flex-col gap-4">
      <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "share-close">Close</button>
      <input class = "bg-neutral-700 text-white rounded px-3 py-2 outline-none w-full" type = "text" id = "find-user" placeholder = "Username here"/>
      <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "send-to-user">Send</button>
      <div class = "text-red-400 text-sm" id = "display-share-response"></div>
    </div>
  </div>

  <div class = "flex items-start">
    <div class = "flex flex-1 justify-center">
      <textarea class = "w-full max-w-4xl mx-auto overflow-hidden bg-neutral-700 text-white rounded-lg p-4 outline-none resize-none" id="edit" placeholder="Text here"></textarea>
    </div>
    <div class = "w-0 overflow-x-hidden transition-all duration-300 bg-neutral-900 text-white h-screen" id = "sidebar">
      <div class = "p-4 overflow-y-auto flex flex-col gap-4">
        <p class = "text-xs text-neutral-400 uppercase tracking-wide">AI Response:</p>
        <div class = "bg-neutral-800 rounded-lg p-3 text-sm text-neutral-200 leading-relaxed" id = "response"></div>
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "accept">Accept</button>
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "decline">Decline</button>
      </div>
    </div>

    <div class = "w-0 overflow-x-hidden transition-all duration-300 bg-neutral-900 text-white h-screen" id = "brainstorm-sidebar">
      <div class = "p-4 overflow-y-auto flex flex-col gap-4">
        <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "brainstorm-close">Close</button>
        <p class = "text-xs text-neutral-400 uppercase tracking-wide">Topics:</p>
        <div class = "bg-neutral-800 rounded-lg p-3 text-sm text-neutral-200 leading-relaxed" id = "topics"></div>
      </div>
    </div>

    <div class = "w-0 overflow-x-hidden transition-all duration-300 bg-neutral-900 text-white h-screen" id = "history-sidebar">
      <div class = "p-4 overflow-y-auto flex flex-col gap-4">
      <button class = "cursor-pointer border-black bg-gradient-to-b from-orange-400 to-orange-800 border rounded-full text-white px-3 py-1 hover:opacity-75 transition-opacity duration-200 flex-shrink-0" id = "history-close">Close</button>
      <p class = "text-xs text-neutral-400 uppercase tracking-wide">History:</p>
      <div id = "history-info"></div>
      </div>
    </div>
  </div>

  <div class = "hidden fixed bottom-4 left-4 bg-neutral-700 text-white px-4 py-2 rounded-lg shadow-lg" id = "notifications"></div>

  <div id = "context-menu" class = "hidden absolute context-menu bg-neutral-900 rounded-lg shadow-lg border border-neutral-700 py-1 w-40">
    <ul class = "list-none p-0 m-0">
      <li data-action = "rewrite" class = "px-4 py-2 text-white text-sm cursor-pointer hover:bg-neutral-700">Rewrite</li>
      <li data-action = "expand" class = "px-4 py-2 text-white text-sm cursor-pointer hover:bg-neutral-700">Expand</li>
      <li data-action = "summarize" class = "px-4 py-2 text-white text-sm cursor-pointer hover:bg-neutral-700">Summarize</li>
    </ul>
  </div>


  <script>
    let isLoaded = false
    let websocket, currentRoom, editInput = document.getElementById("edit"), typingTimer, notifTimer, notifHideTimer, username, aiResponse, info, contextMenu, sidebar, actionValue, selectionStart, selectionEnd, brainstormBar, originalText, id, userIcon, currentUser, share
    let typingUsers = new Set() 
    let httpBase = `${window.location.protocol}//${window.location.host}`
    let wsBase = `${window.location.protocol === "https:" ? "wss:" : "ws:"}//${window.location.host}`

    function closeSidebars() {
      document.getElementById("sidebar").classList.remove("w-80")
      document.getElementById("brainstorm-sidebar").classList.remove("w-80")
      document.getElementById("history-sidebar").classList.remove("w-80")
    }

    function renderUsers(users) {
      userIcon = document.getElementById("user-icon")
      userIcon.innerHTML = ""
      const totalCircles = Math.min(users.length, 3)
      let circle
      for (let i = 0; i < totalCircles; i++){
        circle = document.createElement("div")
        circle.className = "rounded-full w-8 h-8 bg-gradient-to-b from-orange-400 to-orange-800 text-white flex items-center justify-center text-sm font-bold flex-shrink-0"
        circle.textContent = users[i][0].toUpperCase() 
        circle.style.border = "2px solid #262626"

        if (i > 0){
          circle.style.marginLeft = "-12px"
        }
        userIcon.appendChild(circle)
      }
      if (users.length > 3){
        circle = document.createElement("div")
        circle.className = "rounded-full w-8 h-8 bg-gradient-to-b from-orange-400 to-orange-800 text-white flex items-center justify-center text-sm font-bold flex-shrink-0"
        circle.textContent = "+" + (users.length - 3)
        circle.style.marginLeft = "-12px"
        userIcon.appendChild(circle)
      }
    }

    id = new URLSearchParams(window.location.search).get("id")
    const token = localStorage.getItem("token")
    if (!token) {
      window.location.href = `${httpBase}/`
    }

    fetch(`${httpBase}/auth/me`, {
      method: "GET", 
      headers: {
        "Authorization": `Bearer ${token}`
      }
    })
    .then(response => response.json())
    .then(data => {
      username = data 
      userIcon = document.getElementById("user-icon")
      userIcon.textContent = username[0].toUpperCase()
      isLoaded = false
      if(websocket) {websocket.close()}

      const notifDiv = document.getElementById("notifications")

      currentRoom = id
      websocket = new WebSocket(`${wsBase}/ws/${id}/${username}`)

      websocket.onmessage = function(event){
        const edits  = document.getElementById("edit")
        const title = document.getElementById("title")
        const data = JSON.parse(event.data)

        if (data.type == "update"){
          if (isLoaded == false){
            currentUser = JSON.parse(atob(token.split(".")[1]))
            if (currentUser.id === data.owner) {
              share = document.getElementById("share")
              share.classList.remove("hidden")
            }

            title.value = data.title 
            isLoaded = true
          }

          if (edits.value !== data.content){
            edits.value = data.content
            const scrollPos = window.scrollY
            edits.style.height = "auto"
            edits.style.height = edits.scrollHeight + "px"
            window.scrollTo(0, scrollPos)
          }
        }
        else if (data.type == "notification"){
          notifDiv.textContent = data.message 
          clearTimeout(notifTimer)
          clearTimeout(notifHideTimer)
          notifDiv.classList.remove("hidden")
          notifDiv.classList.remove("slide-in")
          notifDiv.classList.remove("slide-out")
          void notifDiv.offsetWidth
          notifDiv.classList.add("slide-in")
          notifTimer = setTimeout(() => {
            notifDiv.classList.remove("slide-in")
            notifDiv.classList.add("slide-out")
          }, 3000)
          notifHideTimer = setTimeout(() => {
            notifDiv.classList.add("hidden")
            notifDiv.classList.remove("slide-out")
          }, 3300)
        }
        else if (data.type == "users"){
          renderUsers(data.users)
        }
        else if (data.type == "title"){
          title.value = data.title
        }
        else if (data.type == "typing"){
          if (data.typing == true){
            typingUsers.add(data.username)
            document.getElementById("typing-user").textContent = Array.from(typingUsers).join(", ") + " is typing"
            document.getElementById("typing").classList.remove("hidden")
            document.getElementById("typing").classList.remove("slide-out")
            void document.getElementById("typing").offsetWidth
            document.getElementById("typing").classList.add("slide-in")
          }

          else if (data.typing == false){
            typingUsers.delete(data.username)
            if (typingUsers.size === 0){
              document.getElementById("typing").classList.remove("slide-in")
              document.getElementById("typing").classList.add("slide-out")
              setTimeout(() => {
                if (typingUsers.size === 0){
                  document.getElementById("typing").classList.add("hidden")
                }
              }, 300)
            }
            else {
              document.getElementById("typing-user").textContent = Array.from(typingUsers).join(", ") + " is typing"
            }
          }
        }
      }

      websocket.onclose = function(){
        document.getElementById("edit").value = "Disconnected"
      }
    })
    document.getElementById("save").addEventListener("click", function(){
      const titleValue = document.getElementById("title").value
      fetch(`${httpBase}/documents/${currentRoom}`,{
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }, 
        body: JSON.stringify({title: titleValue})
      })
    })
    document.getElementById("room-indicator").textContent = id

    document.getElementById("edit").addEventListener("input", function(){
      websocket.send(JSON.stringify({type: "update", content: editInput.value}))
      const scrollPos = window.scrollY 
      this.style.height = "auto"
      this.style.height = this.scrollHeight + "px"
      window.scrollTo(0, scrollPos)

      clearTimeout(typingTimer)
      websocket.send(JSON.stringify({type: "typing", typing: true}))
      typingTimer = setTimeout(() => {
        websocket.send(JSON.stringify({type: "typing", typing: false}))
      }, 2000)
    })

    document.getElementById("edit").addEventListener("contextmenu", function(){
      event.preventDefault() 
      aiResponse = editInput.value.substring(editInput.selectionStart, editInput.selectionEnd)
      selectionStart = editInput.selectionStart 
      selectionEnd = editInput.selectionEnd

      editInput.focus()
      editInput.setSelectionRange(selectionStart, selectionEnd)

      contextMenu = document.getElementById("context-menu")
      contextMenu.classList.remove("hidden")
      let xCoord = event.clientX 
      let yCoord = event.clientY 

      contextMenu.style.left = `${xCoord}px`
      contextMenu.style.top = `${yCoord}px`
    })

    document.getElementById("context-menu").querySelector("ul").addEventListener("click", async function(){
      actionValue = event.target.getAttribute("data-action")
      contextMenu.classList.add("hidden")
      originalText = (actionValue == "expand") ? editInput.value : aiResponse

      const response =  await fetch (`${httpBase}/ai/assist`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json", 
          "Authorization": `Bearer ${token}` 
        },
        body: JSON.stringify({
          action: actionValue, 
          text: originalText
        })
      })

      info = await response.json() 

      sidebar = document.getElementById("sidebar")
      closeSidebars() 
      document.getElementById("response").textContent = info.text 
      sidebar.classList.add("w-80")
    })

    document.getElementById("decline").addEventListener("click", function(){
      sidebar.classList.remove("w-80")
    })

    document.getElementById("accept").addEventListener("click", async function(){
      if (actionValue === "rewrite"){
        editInput.value = `${editInput.value.substring(0, selectionStart)}` + info.text + `${editInput.value.substring(selectionEnd)}`
      }
      else if (actionValue === "expand"){
        editInput.value += info.text 
      }
      else if (actionValue === "summarize"){
        editInput.value += "\n\nSummary:\n" + info.text
      }
      sidebar.classList.remove("w-80")
      websocket.send(JSON.stringify({type: "update", content: editInput.value}))

      const history = await fetch (`${httpBase}/ai/history`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }, 
        body: JSON.stringify({
          document_id: currentRoom, 
          action: actionValue, 
          text: originalText,  
          ai_response: info.text 
        })
      })
    })

    document.getElementById("brainstorm").addEventListener("click", async function(){
      closeSidebars() 
      document.getElementById("topics").textContent = ""
      brainstormBar = document.getElementById("brainstorm-sidebar")
      brainstormBar.classList.add("w-80")
      actionValue = "brainstorm"
      const response =  await fetch (`${httpBase}/ai/assist`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json", 
          "Authorization": `Bearer ${token}` 
        },
        body: JSON.stringify({
          action: actionValue, 
          text: editInput.value 
        })
      })
      info = await response.json() 
      document.getElementById("topics").innerHTML = marked.parse(info.text) 
    })

    document.getElementById("brainstorm-close").addEventListener("click", function(){
      document.getElementById("topics").textContent = ""
      brainstormBar.classList.remove("w-80")
    })

    document.getElementById("history").addEventListener("click", function(){
      closeSidebars()
      document.getElementById("history-sidebar").classList.add("w-80")

      fetch(`${httpBase}/ai/history/${currentRoom}`, {
        method: "GET", 
        headers: {
          "Authorization": `Bearer ${token}`
        }
      })
      
      .then(response => response.json())
      .then(data => {
        const historyDiv = document.getElementById("history-info")
        historyDiv.innerHTML = ""
        for (const history of data){
          const createdAt = new Date(history.created_at).toLocaleString()
          const entry = document.createElement("div")
          entry.className = "flex flex-col mb-2"
          const summary = document.createElement("div")
          summary.className = "bg-neutral-800 px-3 py-2 rounded-lg cursor-pointer hover:bg-neutral-700 text-sm text-white"
          summary.textContent = `${history.username} - ${history.action} - ${createdAt}`

          const details = document.createElement("div")
          details.className = "bg-neutral-700 px-3 py-2 rounded-b-lg text-sm text-neutral-300 mt-1"
          details.innerHTML = `Original: ${history.text}<br><br>AI Response: ${history.ai_response}`
          details.classList.add("hidden")

          summary.addEventListener("click", () => details.classList.toggle("hidden"))

          entry.appendChild(summary)
          entry.appendChild(details)
          historyDiv.appendChild(entry)
        }
      })
    })

    document.getElementById("history-close").addEventListener("click", function(){
      closeSidebars() 
    })

    document.addEventListener("click", function(){
      if (contextMenu){
        if (!contextMenu.contains(event.target)){
          contextMenu.classList.add("hidden")
        }
      }
    })

    document.getElementById("share").addEventListener("click", function(){
      document.getElementById("share-doc").classList.remove("hidden")
      document.getElementById("display-share-response").innerHTML = ""
    })

    document.getElementById("send-to-user").addEventListener("click", async function(){
      const getUsername = document.getElementById("find-user").value
      
      const response = await fetch  (`${httpBase}/documents/${currentRoom}/share`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({username: getUsername})
      })
      info = await response.json()

      const shareResponseDiv = document.getElementById("display-share-response")
      if (response.ok) {
        shareResponseDiv.className = "text-green-400 text-sm"
        shareResponseDiv.innerHTML = info.message 
        document.getElementById("find-user").value = ""
      }
      else {
        shareResponseDiv.className = "text-red-400 text-sm"
        shareResponseDiv.innerHTML = info.detail
      }
    })

    document.getElementById("share-close").addEventListener("click", function(){
      document.getElementById("share-doc").classList.add("hidden")
    })

    document.getElementById("logout").addEventListener("click", function(){
      if(websocket) {websocket.close()}
      localStorage.removeItem("token")
      window.location.href = `${httpBase}/`
    })
  </script>

  <div class = "hidden fixed bottom-4 left-4 bg-neutral-900 text-white px-4 py-2 rounded-lg flex items-center gap-2" id = "typing">
    <span id = "typing-user"></span>
    <span class = "dot inline-block w-2 h-2 rounded-full bg-white"></span>
    <span class = "dot inline-block w-2 h-2 rounded-full bg-white"></span>
    <span class = "dot inline-block w-2 h-2 rounded-full bg-white"></span>
  </div>
</body>
